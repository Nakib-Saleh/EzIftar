apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-provider
  labels:
    app: identity-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-provider
  template:
    metadata:
      labels:
        app: identity-provider
    spec:
      containers:
        - name: identity-provider
          image: eziftar/identity-provider:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PORT
              value: "3000"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@identity-db:5432/identity_db?schema=public"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: identity-provider
  labels:
    app: identity-provider
spec:
  selector:
    app: identity-provider
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
