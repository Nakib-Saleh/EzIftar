apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-service
  labels:
    app: kitchen-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-service
  template:
    metadata:
      labels:
        app: kitchen-service
    spec:
      containers:
        - name: kitchen-service
          image: eziftar/kitchen-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@kitchen-db:5432/kitchen_db?schema=public"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: rabbitmq-pass
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"
            - name: NOTIFICATION_HUB_URL
              value: "http://notification-hub:3004"
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-service
  labels:
    app: kitchen-service
spec:
  selector:
    app: kitchen-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
