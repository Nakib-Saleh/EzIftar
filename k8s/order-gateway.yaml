apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-gateway
  labels:
    app: order-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-gateway
  template:
    metadata:
      labels:
        app: order-gateway
    spec:
      containers:
        - name: order-gateway
          image: eziftar/order-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: jwt-secret
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: eziftar-secrets
                  key: rabbitmq-pass
            - name: IDENTITY_PROVIDER_URL
              value: "http://identity-provider:3000"
            - name: STOCK_SERVICE_URL
              value: "http://stock-service:3002"
            - name: KITCHEN_SERVICE_URL
              value: "http://kitchen-service:3003"
            - name: NOTIFICATION_HUB_URL
              value: "http://notification-hub:3004"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-gateway
  labels:
    app: order-gateway
spec:
  selector:
    app: order-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
