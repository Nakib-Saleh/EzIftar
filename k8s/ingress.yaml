apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eziftar-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: eziftar.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: order-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
