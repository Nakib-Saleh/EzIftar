services:
  # ============================================
  # IDENTITY PROVIDER - Authentication & JWT
  # ============================================
  identity-provider:
    build: ./services/identity-provider
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${IDENTITY_DB_USER}:${IDENTITY_DB_PASSWORD}@identity-db:5432/${IDENTITY_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    depends_on:
      - identity-db
    command: sh -c "bunx prisma db push && bun dist/index.js"
    restart: always

  # ============================================
  # ORDER GATEWAY - API Gateway + JWT Validation + Cache Check
  # ============================================
  order-gateway:
    build: ./services/order-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - IDENTITY_PROVIDER_URL=http://identity-provider:3000
      - STOCK_SERVICE_URL=http://stock-service:3002
      - KITCHEN_SERVICE_URL=http://kitchen-service:3003
      - NOTIFICATION_HUB_URL=http://notification-hub:3004
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      - identity-provider
      - stock-service
      - kitchen-service
      - notification-hub
      - redis
      - rabbitmq
    restart: always

  # ============================================
  # STOCK SERVICE - Inventory Management + Optimistic Locking
  # ============================================
  stock-service:
    build: ./services/stock-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${STOCK_DB_USER}:${STOCK_DB_PASSWORD}@stock-db:5432/${STOCK_DB_NAME}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      - stock-db
      - redis
    command: sh -c "bunx prisma db push && bun dist/index.js"
    restart: always

  # ============================================
  # KITCHEN SERVICE - Async Order Processing (3-7s cooking)
  # ============================================
  kitchen-service:
    build: ./services/kitchen-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://${KITCHEN_DB_USER}:${KITCHEN_DB_PASSWORD}@kitchen-db:5432/${KITCHEN_DB_NAME}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      - NOTIFICATION_HUB_URL=http://notification-hub:3004
    depends_on:
      - kitchen-db
      - rabbitmq
    command: sh -c "bunx prisma db push && bun dist/index.js"
    restart: always

  # ============================================
  # NOTIFICATION HUB - Real-Time WebSocket (Socket.IO)
  # ============================================
  notification-hub:
    build: ./services/notification-hub
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: always

  # ============================================
  # FRONTEND - React + Vite SPA
  # ============================================
  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:8080/api
      - VITE_NOTIFICATION_HUB_URL=http://localhost:3004
    depends_on:
      - order-gateway

  # ============================================
  # DATABASES
  # ============================================
  identity-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=${IDENTITY_DB_USER}
      - POSTGRES_PASSWORD=${IDENTITY_DB_PASSWORD}
      - POSTGRES_DB=${IDENTITY_DB_NAME}
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  stock-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=${STOCK_DB_USER}
      - POSTGRES_PASSWORD=${STOCK_DB_PASSWORD}
      - POSTGRES_DB=${STOCK_DB_NAME}
    volumes:
      - stock-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  kitchen-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=${KITCHEN_DB_USER}
      - POSTGRES_PASSWORD=${KITCHEN_DB_PASSWORD}
      - POSTGRES_DB=${KITCHEN_DB_NAME}
    volumes:
      - kitchen-db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  # ============================================
  # INFRASTRUCTURE
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always

  # ============================================
  # MONITORING
  # ============================================
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/my_dashboards

volumes:
  identity-db-data:
  stock-db-data:
  kitchen-db-data:
  redis-data:
  rabbitmq-data:
  grafana-storage:
